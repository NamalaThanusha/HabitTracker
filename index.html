<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow – Smart Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <style>
        body[data-theme="dark"] {
            color: #e2e8f0;
            background: #020617;
        }

        body[data-theme="light"] {
            color: #0f172a;
            background: #f8fafc;
        }

        body[data-theme="light"] .app-shell {
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 32%), linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body[data-theme="dark"] .app-shell {
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.14), transparent 32%), linear-gradient(180deg, #020617 0%, #0f172a 100%);
        }

        body[data-theme="light"] .panel-card,
        body[data-theme="light"] .habit-card,
        body[data-theme="light"] .empty-card {
            background: rgba(255, 255, 255, 0.98);
            border-color: rgba(226, 232, 240, 0.95);
            color: #0f172a;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
        }

        body[data-theme="light"] .habit-card.completed {
            box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.35), 0 0 24px rgba(34, 197, 94, 0.12);
        }

        body[data-theme="light"] .stat-card {
            color: #0f172a;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.96));
            border-color: rgba(226, 232, 240, 0.95);
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
        }

        body[data-theme="light"] .stat-label {
            color: #64748b;
        }

        body[data-theme="light"] .stat-value {
            color: #0f172a;
        }

        body[data-theme="light"] .form-subtitle,
        body[data-theme="light"] .page-subheading,
        body[data-theme="light"] .empty-copy,
        body[data-theme="light"] .muted-text {
            color: #475569;
        }

        body[data-theme="light"] .section-title,
        body[data-theme="light"] .page-heading,
        body[data-theme="light"] .habit-title,
        body[data-theme="light"] .empty-title {
            color: #0f172a;
        }

        body[data-theme="light"] .habit-input {
            background: rgba(248, 250, 252, 0.95);
            border-color: rgba(148, 163, 184, 0.55);
            color: #0f172a;
        }

        body[data-theme="light"] .habit-input::placeholder {
            color: #64748b;
        }

        body[data-theme="light"] .theme-toggle {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(148, 163, 184, 0.45);
            color: #0f172a;
        }

        body[data-theme="light"] .primary-btn {
            box-shadow: 0 12px 24px rgba(14, 165, 233, 0.18);
        }

        body[data-theme="light"] .btn-done {
            background: #2563eb;
            color: #ffffff;
        }

        body[data-theme="light"] .btn-done:hover:not(:disabled) {
            background: #1d4ed8;
        }

        body[data-theme="light"] .btn-delete {
            background: #ef4444;
            color: #ffffff;
        }

        body[data-theme="light"] .btn-delete:hover {
            background: #dc2626;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pop {
            0% { transform: scale(0.95); }
            60% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .habit-card {
            animation: slideIn 0.28s ease-out;
        }

        .habit-card.completed {
            box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.35), 0 0 24px rgba(74, 222, 128, 0.12);
        }

        .btn-done,
        .btn-delete,
        .theme-toggle,
        .add-btn {
            transition: transform 160ms ease, background-color 160ms ease, border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
        }

        .btn-done:hover,
        .btn-delete:hover,
        .theme-toggle:hover,
        .add-btn:hover {
            transform: translateY(-1px);
        }

        .btn-done:active,
        .btn-delete:active,
        .theme-toggle:active,
        .add-btn:active {
            transform: translateY(0);
        }

        .streak-badge {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .done-pop {
            animation: pop 240ms ease-out;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.75;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen" data-theme="dark">
    <div class="app-shell min-h-screen px-4 py-8 sm:py-12">
        <div class="max-w-5xl mx-auto">
            <div class="flex flex-col gap-6 mb-8 sm:mb-10">
                <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
                    <div>
                        <p class="page-subheading text-xs uppercase tracking-[0.35em] text-sky-300/80 mb-3">Daily Progress</p>
                        <h1 class="page-heading text-4xl sm:text-5xl font-black tracking-tight text-white">Habit Tracker</h1>
                        <p class="muted-text mt-3 text-slate-400 max-w-2xl">Track routines, protect streaks, and keep your day organized with a calm dashboard.</p>
                    </div>
                    <button id="themeToggle" class="theme-toggle inline-flex items-center justify-center gap-2 rounded-full border border-slate-700 bg-slate-900/80 px-4 py-2 text-sm font-semibold text-slate-200 shadow-lg shadow-black/20 hover:border-slate-500 hover:bg-slate-800">
                        <span id="themeToggleIcon">🌙</span>
                        <span id="themeToggleText">Dark mode</span>
                    </button>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                <div class="stat-card rounded-2xl border border-sky-500/20 bg-gradient-to-br from-sky-600/30 via-sky-500/20 to-slate-900 p-6 shadow-xl shadow-sky-950/20 backdrop-blur">
                    <p class="stat-label text-slate-200/80 text-sm uppercase tracking-[0.24em]">Total Habits</p>
                    <p class="stat-value mt-2 text-4xl font-black text-white" id="totalHabits">0</p>
                </div>
                <div class="stat-card rounded-2xl border border-emerald-500/20 bg-gradient-to-br from-emerald-600/30 via-emerald-500/20 to-slate-900 p-6 shadow-xl shadow-emerald-950/20 backdrop-blur">
                    <p class="stat-label text-slate-200/80 text-sm uppercase tracking-[0.24em]">Completed Today</p>
                    <p class="stat-value mt-2 text-4xl font-black text-white" id="completedToday">0</p>
                </div>
            </div>

            <!-- Add Habit Form -->
            <div class="panel-card rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-xl shadow-black/20 backdrop-blur mb-8">
                <div class="flex items-center justify-between gap-4 mb-4">
                    <div>
                        <h2 class="section-title text-lg font-semibold text-white">Add New Habit</h2>
                        <p class="form-subtitle text-sm text-slate-400">Press Enter to add quickly.</p>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <input
                        type="text"
                        id="habitInput"
                        placeholder="Enter habit name, like Pushups or Study"
                        class="habit-input flex-1 rounded-xl border border-slate-700 bg-slate-950/80 px-4 py-3 text-slate-100 placeholder:text-slate-500 shadow-inner shadow-black/10 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/40"
                    >
                    <button
                        id="addBtn"
                        class="add-btn primary-btn rounded-xl bg-sky-600 px-6 py-3 font-semibold text-white shadow-lg shadow-sky-950/30 hover:bg-sky-500 whitespace-nowrap"
                    >
                        Add Habit
                    </button>
                </div>
            </div>

            <!-- Habits List -->
            <div id="habitsList" class="space-y-4">
                <!-- Habits will be rendered here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="text-center py-14 hidden">
                <div class="empty-card mx-auto max-w-md rounded-3xl border border-dashed border-slate-700 bg-slate-900/50 px-6 py-10 text-slate-400 shadow-lg shadow-black/10">
                    <p class="empty-title text-lg font-medium text-slate-200">No habits yet</p>
                    <p class="empty-copy mt-2">Add your first habit to start building momentum.</p>
                </div>
            </div>

            <footer class="py-8 text-center text-sm text-slate-500">
                Built by Thanusha 🚀
            </footer>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
